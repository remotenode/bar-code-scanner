name: bar_code_scanner
description: A production-ready Barcode & QR Code Scanner app with modern UI, multi-format support, and scan history.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # Scanner
  mobile_scanner: ^6.0.2

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # UI
  cupertino_icons: ^1.0.8

  # Utilities
  share_plus: ^10.1.3
  url_launcher: ^6.3.1
  vibration: ^3.0.0
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1

  # State Management
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Build tools
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3

  # Hive code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/sounds/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#121212"
  image: assets/icons/splash_icon.png
  android_12:
    color: "#FFFFFF"
    color_dark: "#121212"
    icon_background_color: "#FFFFFF"
    icon_background_color_dark: "#121212"
